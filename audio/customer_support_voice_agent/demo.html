<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Support Voice Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .hero {
      text-align: center;
      max-width: 480px;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
      letter-spacing: 0.3px;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.3;
    }

    .widget-wrap {
      display: flex;
      justify-content: center;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="badge">Live Demo</div>
    <h1>Customer Support Voice Agent</h1>
  </div>

  <div class="widget-wrap">
    <telnyx-ai-agent
      agent-id="assistant-82094bd1-1a27-42b0-9dbb-52c56d2fbe62"
      environment="production">
    </telnyx-ai-agent>
    <script async src="https://unpkg.com/@telnyx/ai-agent-widget@next"></script>
  </div>

  <p class="footer">
    Built with Telnyx AI Assistant Builder &middot; FastAPI Dynamic Variables Webhook &middot; Kimi K2.5
  </p>

</body>
</html>
